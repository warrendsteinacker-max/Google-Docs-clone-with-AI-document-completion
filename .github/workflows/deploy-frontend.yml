name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4



      # 1. Step into the correct directory, install packages, and build the Vite app
      - name: Build Frontend
        working-directory: my-docs-ai-app/frontend
        run: |
          npm install
          npm run build

      # 2. Upload the correct build output folder (Vite defaults to 'dist' inside the project folder)
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: my-docs-ai-app/frontend/dist


      - name: Inject backend URL
        env:
          API_BASE_URL: ${{ vars.GEMINI_API_KEY }}
        run: |
          mkdir -p dist
          cp -r my-docs-ai-app/frontend/* dist/
          if [ -n "$GEMINI_API_KEY" ]; then
            sed -i "s|__GEMINI_API_KEY__|${GEMINI_API_KEY}|g" dist/index.html
          fi

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist
      - id: deployment
        uses: actions/deploy-pages@v4