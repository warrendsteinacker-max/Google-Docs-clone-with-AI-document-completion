<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body style="align-items: center; display: flex; height: 100vh; flex-direction: column; gap: 50px; position: relative">
    
    <div style="position:sticky; top: 10px; left: 10px; width: 98%; height: 50px; background-color: #f8f9fa; border: 1px solid #dee2e6; align-items: center; justify-content: center; display: flex; flex-direction: row; padding: 20px;">heading</div>

    <div style="justify-content: center; align-items: center; display: flex; height: 100vh; flex-direction: column; gap: 10px">

    <form onsubmit="sub(event)" style="border: 5px solid black; border-radius: 10px; padding: 30px; display: flex; justify-content: center; align-items: center; flex-direction: column; gap: 30px">
        
        
        <input oninput="onchange1(event)" type="text" placeholder="Enter title" style="width: 300px; height: 30px; border-radius: 5px; border: 1px solid #ced4da; padding: 5px; font-size: 16px;">


        <textarea oninput="onchange2(event)">

        </textarea>

        <button type="submit" style="width: 100px; height: 40px; border-radius: 5px; border: none; background-color: #007bff; color: white; font-size: 16px;">Submit</button>
    </form>

    <div id="holder"></div>

    </div>



<script>

    const holder = document.getElementById("holder")


    let data = localStorage.getItem("data") !== null ? JSON.parse(localStorage.getItem("data")) : []

    console.log(data)

    let val

    let val2


    for(let i = 0; i < data.length; i++){

     const div = document.createElement("div")

     div.style="border: 1px solid black; padding: 10px; margin: 5px; width: 300px; height: auto; border-radius: 5px;"

    div.id = i

    const title = document.createElement("h1").textContent = data[i].title

    const dep = document.createElement("p").textContent = data[i].dep

    const delb = document.createElement("button")

    delb.textContent = "delete"

    delb.onclick = del()

    div.append(title)
    div.append(dep)
    div.append(delb)
    holder.append(div)

    }





    function del(event) {

        let newd = data.filter((item, index) => index !== event.target.id)

        const dd = [...newd]

        localStorage.setItem("data", JSON.stringify(dd))

        window.location.reload()
    }

    function onchange1(event) {
        val = event.target.value

        console.log(val)
    }

    function onchange2(event) {
        val2 = event.target.value
        console.log(val2)
    }

    function sub(event) {

        event.preventDefault()


        const d = localStorage.getItem("data") !== null ? JSON.parse(localStorage.getItem("data")) : []


        let setd = {
            title: val,
            dep: val2
        }

        const dd = [...d, setd]

       localStorage.setItem("data", JSON.stringify(dd))

        console.log(d)

        val = ""
        val2 = ""
        window.location.reload()



    }


</script>
</body>
</html>
