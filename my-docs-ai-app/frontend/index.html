  <body>


<div id="con"> 


</div>


    <script>

        const container = document.getElementById("con")
        const data = [{name: "John Doe"},{name: "Jane Smith"},{name: "Bob Johnson"}] // Example data, replace with actual data
        let newd = []

        const dbounce = (fn, d) => {
            let timer

            return function(...args){
                clearTimeout(timer)
                timer = setTimeout(() => fn(...args), d)
            }
        }

        function searchf(event){
            
            container.innerHTML = ""

            const d = data.filter(item => item.name.toLowerCase().includes(event.target.value.toLowerCase()))
            newd = d

            for(let i = 0; i < d.length; i++){
                const el = document.createElement("div")
                el.textContent = d[i].name
                el.id = i
                container.body.appendChild(el)
            }

        }

        const dbsearchf = dbounce(searchf, 1000)


    </script>
